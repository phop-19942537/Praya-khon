<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>พระยาขอน x ทนอึด Hybrid V5</title>
    <style>
        :root {
            --bg-color: #000; --text-color: #fff; --box-bg: #0d0d0d; --border-color: #222;
            --config-bg: #111; --dot-empty: #1a1a1a; --neon-blue: #00f2ff; --neon-red: #ff4444;
            --neon-green: #2ecc71; --gold: #ffd700;
        }
        .light-theme {
            --bg-color: #e0e4e8; --text-color: #1a1a1a; --box-bg: #ffffff; --border-color: #b0b8c1;
            --config-bg: #f8f9fa; --dot-empty: #d1d9e6;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Segoe UI', 'Kanit', sans-serif; 
            background: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        .header-area { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .super-toggle { background: var(--config-bg); border: 2px solid var(--border-color); color: var(--text-color); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: 800; font-size: 12px; }
        .super-toggle.on { background: var(--neon-blue); color: #000; border-color: #fff; box-shadow: 0 0 10px var(--neon-blue); }
        
        .prediction-center { margin-bottom: 20px; text-align: center; }
        .target-circle { 
            width: 110px; height: 110px; border: 4px solid var(--border-color); border-radius: 50%; 
            margin: 0 auto; font-size: 32px; font-weight: 900; color: #444; background: var(--box-bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
            transition: all 0.3s ease;
        }
        .bet-display { font-size: 14px; color: #fbbf24; margin-top: 2px; font-weight: 800; }
        .active-P { background: #0044ff !important; color: #fff !important; box-shadow: 0 0 20px #0044ff; }
        .active-B { background: #cc0000 !important; color: #fff !important; box-shadow: 0 0 20px #cc0000; }
        
        .money-status-bar { 
            width: 100%; max-width: 400px; background: var(--config-bg); 
            border: 1px solid var(--border-color); border-radius: 10px; 
            padding: 8px 15px; margin-bottom: 10px; display: flex; 
            justify-content: space-between; align-items: center; font-size: 13px;
        }

        .grid { display: grid; grid-template-rows: repeat(6, 1fr); grid-template-columns: repeat(12, 1fr); grid-auto-flow: column; gap: 4px; width: 100%; }
        .dot { width: 100%; aspect-ratio: 1; border-radius: 50%; background: var(--dot-empty); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #fff; }
        .dot.P { background: #0044ff; } .dot.B { background: #cc0000; } .dot.T { background: #2ecc71; }
        
        .main-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 400px; margin-bottom: 15px; }
        .btn { padding: 20px 0; border: none; border-radius: 12px; font-size: 28px; font-weight: 900; color: #fff; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.4); }
        .btn-p { background: #0044ff; } .btn-t { background: #2ecc71; } .btn-b { background: #cc0000; }
        .btn-sub { padding: 12px 0; border: 2px solid var(--border-color); border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; background: var(--config-bg); color: var(--text-color); width: 100%; }
        
        /* Modal & Goals UI */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: #111; width: 85%; max-width: 320px; border-radius: 20px; padding: 25px; border: 1px solid #333; text-align: center; }
        
        /* Special Goal Success UI */
        .goal-content { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
        .success-icon { width: 80px; height: 80px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 40px; color: #000; box-shadow: 0 0 20px var(--gold); }
        
        .history-list { max-height: 250px; overflow-y: auto; text-align: left; margin-top: 15px; }
        .history-item { padding: 8px 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header-area">
        <button class="super-toggle" id="superBtn" onclick="toggleSuperMode()">⚡ SUPER OFF</button>
        <button class="btn-sub" style="width: auto; padding: 5px 15px; border-radius: 20px;" onclick="toggleTheme()">🌓 THEME</button>
    </div>

    <div class="prediction-center">
        <div id="target" class="target-circle">
            <span id="targetText">-</span>
            <div id="ui-bet" class="bet-display"></div>
            <div id="targetDna" style="position: absolute; bottom: -22px; font-size: 10px; color: #888;"></div>
        </div>
    </div>

    <div class="money-status-bar">
        <div>กำไร: <span id="ui-bal">0</span></div>
        <div id="ui-mode" style="font-size:10px; color:var(--neon-blue);">โหมดปกติ</div>
        <div style="color:#888;">เป้า: <span id="curTargetDisp"></span></div>
    </div>

    <div style="width: 100%; max-width: 400px; display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px;">
        <div style="display:flex; gap:8px; font-weight: bold;">
            <span style="color:#0044ff">P: <span id="countP">0</span></span>
            <span style="color:var(--neon-green)">T: <span id="countT">0</span></span>
            <span style="color:#cc0000">B: <span id="countB">0</span></span>
        </div>
        <div onclick="openModal('historyModal')" style="cursor:pointer; background: rgba(46,204,113,0.1); padding: 2px 10px; border-radius: 5px; color: var(--neon-green); font-weight: bold;">
            🏆 WIN: <span id="winCountSmall">0</span> ▾
        </div>
    </div>

    <div style="background:var(--box-bg); border-radius:12px; padding:8px; width:100%; max-width:400px; margin-bottom:15px; border:2px solid var(--border-color);">
        <div id="grid" class="grid"></div>
    </div>

    <div class="main-buttons">
        <button class="btn btn-p" onclick="processAdd('P')">P</button>
        <button class="btn btn-t" onclick="processAdd('T')">T</button>
        <button class="btn btn-b" onclick="processAdd('B')">B</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; max-width: 400px;">
        <button class="btn-sub" onclick="undo()">ย้อนกลับ</button>
        <button class="btn-sub" style="color: var(--gold);" onclick="openModal('mainSettingModal')">ตั้งค่า</button>
        <button class="btn-sub" style="color:var(--neon-red);" onclick="openModal('resetConfirmModal')">ล้างข้อมูล</button>
    </div>

    <div id="goalReachedModal" class="modal">
        <div class="modal-content goal-content" onclick="event.stopPropagation()">
            <div class="success-icon">💰</div>
            <h2 style="color: var(--gold); margin: 0;">บรรลุเป้าหมาย!</h2>
            <p style="color: #fff; font-size: 18px; margin: 10px 0;">กำไรสะสม: <span id="finalProfit" style="color:var(--neon-green); font-weight: bold;">0</span></p>
            <p style="color: #888; font-size: 12px;">ยินดีด้วย! คุณทำกำไรได้ตามเป้าหมายที่ตั้งไว้แล้ว ควรพักผ่อนหรือเริ่มต้นรอบใหม่</p>
            <button class="btn-sub" style="background: var(--gold); color: #000; border: none; margin-top: 15px;" onclick="closeModals()">ขอบคุณ (ไปต่อ)</button>
            <button class="btn-sub" style="background: transparent; color: var(--neon-red); border: 1px solid var(--neon-red); margin-top: 8px;" onclick="resetAll()">เริ่มรอบใหม่ทันที</button>
        </div>
    </div>

    <div id="resetConfirmModal" class="modal" onclick="closeModals()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="font-size: 40px; margin-bottom: 10px;">⚠️</div>
            <h3 style="color: #fff; margin: 0;">รีเซ็ตข้อมูลทั้งหมด?</h3>
            <p style="color: #666; font-size: 12px; margin: 10px 0 20px;">สถิติและกำไรจะถูกล้างค่าทั้งหมด</p>
            <button class="btn-sub" style="background: var(--neon-red); color: #fff; border: none;" onclick="resetAll()">ยืนยัน</button>
            <button class="btn-sub" style="background: #222; color: #888; border: none; margin-top: 8px;" onclick="closeModals()">ยกเลิก</button>
        </div>
    </div>

    <div id="historyModal" class="modal" onclick="closeModals()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="color: var(--neon-green); margin-top: 0;">ประวัติการชนะ</h3>
            <div id="historyContainer" class="history-list"></div>
            <button class="btn-sub" style="margin-top: 15px;" onclick="closeModals()">ปิด</button>
        </div>
    </div>

    <div id="mainSettingModal" class="modal" onclick="closeModals()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="color:var(--gold);">ตั้งค่า</h3>
            <div style="text-align: left; font-size: 12px; display: grid; gap: 8px;">
                <label>เงินเดินไม้ (10, 20...):</label><input type="text" id="money-sequence" value="10, 20, 40, 80, 160" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333; border-radius: 8px;">
                <label>เป้าหมายกำไร:</label><input type="number" id="profit-target" value="" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333; border-radius: 8px;">
                <div style="display: flex; gap: 5px;">
                    <button class="btn-sub" onclick="openModal('logicModal')">DNA: <span id="curDNA">2^7</span></button>
                    <button class="btn-sub" onclick="openModal('lvModal')">LV: <span id="curLv">1</span></button>
                </div>
            </div>
            <button class="btn-sub" style="margin-top:15px; background:var(--gold); color:#000; border:none;" onclick="updateConfigs()">บันทึก</button>
        </div>
    </div>
    
    <div id="logicModal" class="modal" onclick="closeModals()"><div class="modal-content" onclick="event.stopPropagation()"><h3 style="color:var(--neon-blue);">เลือก DNA</h3><div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"><button class="btn-sub" onclick="setLogic(5)">2^5</button><button class="btn-sub" onclick="setLogic(7)">2^7</button><button class="btn-sub" onclick="setLogic(9)">2^9</button><button class="btn-sub" onclick="setLogic(11)">2^11</button></div></div></div>
    <div id="lvModal" class="modal" onclick="closeModals()"><div class="modal-content" onclick="event.stopPropagation()"><h3 style="color:var(--neon-green);">ระดับ LV</h3><div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;"><button class="btn-sub" onclick="setLv(1)">1</button><button class="btn-sub" onclick="setLv(2)">2</button><button class="btn-sub" onclick="setLv(3)">3</button><button class="btn-sub" onclick="setLv(4)">4</button><button class="btn-sub" onclick="setLv(5)">5</button><button class="btn-sub" onclick="setLv(6)">6</button></div></div></div>

<script>
    let log = [], winDetails = [], historyStack = [];
    let isFound = false, aim = "", isLoss = false, goalReached = false;
    let selectedLv = 1, currentExp = 7, isSuperMode = false, lockedDNA = null;
    let moneySequence = [10, 20, 40, 80, 160];
    let mState = { idx: 0, pos: 1, bal: 0, bet: 10, isClearing: false };

    const allProfiles = {};
    [5, 7, 9, 11].forEach(exp => {
        const count = Math.pow(2, exp); allProfiles[exp] = [];
        for(let i=0; i<count; i++) allProfiles[exp].push(i.toString(2).padStart(exp,'0').split('').map(b => b === '0' ? 'M' : 'T'));
    });

    function calculateBet() {
        let base = moneySequence[mState.idx] || moneySequence[moneySequence.length-1];
        mState.bet = mState.isClearing ? base * 2 : base;
    }

    function processAdd(v) {
        historyStack.push(JSON.stringify({ log: [...log], winDetails: [...winDetails], isFound, aim, isLoss, lockedDNA, mState: {...mState}, goalReached }));

        if (isFound && v !== 'T') {
            if (v === aim) { // WIN
                mState.bal += mState.bet;
                winDetails.unshift({ dna: "2^"+(lockedDNA||currentExp), step: (mState.idx+1), pos: mState.pos, bet: mState.bet, result: aim });
                
                // ตรวจสอบเป้าหมาย
                let targetProfit = parseFloat(document.getElementById('profit-target').value);
                if (mState.bal >= targetProfit && !goalReached) {
                    goalReached = true;
                    document.getElementById('finalProfit').innerText = mState.bal.toLocaleString();
                    openModal('goalReachedModal');
                }

                if (mState.isClearing) { mState.isClearing = false; mState.pos = 1; }
                else {
                    if (mState.idx === 0 || mState.pos === 2) { mState.pos = 1; }
                    else { mState.idx = Math.max(0, mState.idx - 1); mState.isClearing = true; mState.pos = 1; }
                }
                isFound = false; lockedDNA = null;
            } else { // LOSS
                mState.bal -= mState.bet;
                if (mState.isClearing) {
                    mState.isClearing = false;
                    if(mState.idx >= moneySequence.length - 1) { isLoss = true; mState.idx = 0; } else { mState.idx++; }
                    mState.pos = 1;
                } else {
                    if (mState.pos === 1) mState.pos = 2;
                    else {
                        if(mState.idx >= moneySequence.length - 1) { isLoss = true; mState.idx = 0; } else { mState.idx++; }
                        mState.pos = 1;
                    }
                }
                isFound = false;
            }
        } else if (isLoss) { isLoss = false; }
        
        log.push(v);
        calculateBet();
        render();
    }

    function scanLogic(exp, cleanData) {
        const profiles = allProfiles[exp];
        let stats = Array.from({length: profiles.length}, () => ({streak:0}));
        for (let r=0; r <= cleanData.length; r++) {
            for (let d=0; d<profiles.length; d++) {
                let pBit = profiles[d][r % exp], predict, actual = cleanData[r];
                if (r > 0) {
                    let prev = cleanData[r-1];
                    predict = (pBit === 'M') ? prev : (prev === 'P' ? 'B' : 'P');
                    if (actual === undefined) { if (stats[d].streak - (exp - 1) >= selectedLv) return predict; }
                    else { if (predict !== actual) stats[d].streak++; else stats[d].streak = 0; }
                }
            }
        } return null;
    }

    function render() {
        const clean = log.filter(x => x !== 'T');
        const target = document.getElementById('target');
        const targetText = document.getElementById('targetText');
        target.className = "target-circle";
        document.getElementById('ui-bet').innerText = "";

        if (isLoss) {
            targetText.innerText = "L"; target.style.color = "var(--neon-red)";
        } else {
            if (clean.length >= 3) {
                if (isSuperMode && !lockedDNA) {
                    for (let e of [5, 7, 9, 11]) {
                        let res = scanLogic(e, clean); if (res) { lockedDNA = e; aim = res; isFound = true; break; }
                    }
                } else { aim = scanLogic(lockedDNA || currentExp, clean); isFound = !!aim; }
            }
            if (isFound) {
                targetText.innerText = (mState.pos === 1 ? "①" : "②") + aim;
                document.getElementById('ui-bet').innerText = "[" + mState.bet + "]";
                target.classList.add(`active-${aim}`);
                document.getElementById('targetDna').innerText = "DNA 2^" + (lockedDNA || currentExp);
            } else { targetText.innerText = "-"; document.getElementById('targetDna').innerText = ""; }
        }

        const grid = document.getElementById('grid'); grid.innerHTML = "";
        log.forEach(v => { const d = document.createElement('div'); d.className = 'dot ' + v; d.innerText = v; grid.appendChild(d); });
        for(let i=log.length; i<72; i++) grid.appendChild(document.createElement('div')).className='dot';

        document.getElementById('ui-bal').innerText = mState.bal.toLocaleString();
        document.getElementById('ui-bal').style.color = mState.bal >= 0 ? "var(--neon-green)" : "var(--neon-red)";
        document.getElementById('ui-mode').innerText = (mState.isClearing ? "⭐ เคลียร์ S" : "ปกติ S") + (mState.idx+1);
        document.getElementById('winCountSmall').innerText = winDetails.length;
        document.getElementById('countP').innerText = log.filter(x=>x==='P').length;
        document.getElementById('countB').innerText = log.filter(x=>x==='B').length;
        document.getElementById('countT').innerText = log.filter(x=>x==='T').length;
        
        document.getElementById('historyContainer').innerHTML = winDetails.map((w, i) => `
            <div class="history-item"><span>#${winDetails.length-i} ชนะ ${w.result} (${w.dna})</span><span style="color:var(--gold)">S${w.step} M${w.pos} [+${w.bet}]</span></div>
        `).join('') || "<div style='text-align:center; color:#444; margin-top:20px;'>ไม่มีข้อมูล</div>";
    }

    function toggleSuperMode() { isSuperMode = !isSuperMode; document.getElementById('superBtn').innerText = isSuperMode ? "⚡ SUPER ON" : "⚡ SUPER OFF"; document.getElementById('superBtn').classList.toggle('on'); lockedDNA = null; render(); }
    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function openModal(id) { closeModals(); document.getElementById(id).style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function setLogic(exp) { currentExp = exp; document.getElementById('curDNA').innerText = `2^${exp}`; closeModals(); openModal('mainSettingModal'); render(); }
    function setLv(v) { selectedLv = v; document.getElementById('curLv').innerText = v; closeModals(); openModal('mainSettingModal'); render(); }
    function updateConfigs() { moneySequence = document.getElementById('money-sequence').value.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n)); document.getElementById('curTargetDisp').innerText = document.getElementById('profit-target').value; calculateBet(); closeModals(); render(); }
    function undo() { if (historyStack.length > 0) { let p = JSON.parse(historyStack.pop()); log = p.log; winDetails = p.winDetails; isFound = p.isFound; aim = p.aim; isLoss = p.isLoss; lockedDNA = p.lockedDNA; mState = p.mState; goalReached = p.goalReached; render(); } }
    
    function resetAll() {
        log=[]; winDetails=[]; isFound=false; isLoss=false; lockedDNA=null; goalReached=false;
        mState={idx:0,pos:1,bal:0,bet:moneySequence[0],isClearing:false};
        historyStack=[]; closeModals(); render();
    }
    
    render();
</script>
</body>
</html>
